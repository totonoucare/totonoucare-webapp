name: Radar notifications

on:
  schedule:
    # 17:00 JST: 明日の未病予報と「今夜からできる先回りケア」通知
    - cron: "0 8 * * *"
    # 07:30 JST: 朝の見返し通知
    - cron: "30 22 * * *"
  workflow_dispatch:
    inputs:
      type:
        description: "night or morning"
        required: false
        default: "night"

jobs:
  send-radar-notifications:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Decide notification type
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TYPE="${{ github.event.inputs.type }}"
          elif [ "${{ github.event.schedule }}" = "0 8 * * *" ]; then
            TYPE="night"
          else
            TYPE="morning"
          fi
          echo "type=$TYPE" >> "$GITHUB_OUTPUT"

      - name: Call radar notification cron endpoint
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          TYPE: ${{ steps.vars.outputs.type }}
        shell: bash
        run: |
          test -n "$APP_BASE_URL"
          test -n "$CRON_SECRET"

          curl --fail --show-error --silent \
            --request GET \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_BASE_URL}/api/cron/radar-notifications/${TYPE}"
