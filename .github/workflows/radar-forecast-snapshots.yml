name: Radar forecast snapshots

on:
  schedule:
    # 01:05 JST: 今日分と明日分の固定スナップショットを作り直す
    - cron: "5 16 * * *"
    # 16:30 JST: 今日分は触らず、明日分だけ最新の予報で更新する
    - cron: "30 7 * * *"
  workflow_dispatch:
    inputs:
      dates:
        description: "today,tomorrow or YYYY-MM-DD"
        required: false
        default: "today,tomorrow"
      limit:
        description: "Maximum users to process"
        required: false
        default: "100"
      force:
        description: "1 to recompute existing snapshots"
        required: false
        default: "1"

jobs:
  build-radar-forecast-snapshots:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Decide snapshot targets
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DATES="${{ github.event.inputs.dates || 'today,tomorrow' }}"
            SLOT="manual"
          elif [ "${{ github.event.schedule }}" = "30 7 * * *" ]; then
            DATES="tomorrow"
            SLOT="evening_tomorrow"
          else
            DATES="today,tomorrow"
            SLOT="morning_fixed"
          fi
          echo "dates=$DATES" >> "$GITHUB_OUTPUT"
          echo "slot=$SLOT" >> "$GITHUB_OUTPUT"

      - name: Call radar forecast snapshot cron endpoint
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DATES: ${{ steps.vars.outputs.dates }}
          SLOT: ${{ steps.vars.outputs.slot }}
          LIMIT: ${{ github.event.inputs.limit || '100' }}
          FORCE: ${{ github.event.inputs.force || '1' }}
        shell: bash
        run: |
          test -n "$APP_BASE_URL"
          test -n "$CRON_SECRET"

          curl --fail --show-error --silent \
            --request GET \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_BASE_URL}/api/cron/radar-forecast-snapshots?dates=${DATES}&limit=${LIMIT}&force=${FORCE}&slot=${SLOT}"
